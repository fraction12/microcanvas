name: Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  node:
    name: TypeScript, tests, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript validation
        run: npm run check

      - name: JavaScript tests
        run: npm test

      - name: Package dry run
        run: npm run pack:dry-run

  swift-viewer:
    name: Swift viewer tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Swift package tests
        run: swift test --package-path apps/macos-viewer/MicrocanvasViewer
